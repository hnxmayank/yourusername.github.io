<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry 🥺</title><style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
}

/* LIQUID GRADIENT BACKGROUND */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(270deg, #ff9a9e, #fad0c4, #fbc2eb);
    background-size: 600% 600%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

/* EMOJIS UNDER LAYER */
.emoji {
    position: fixed;
    bottom: -20px;
    font-size: 18px;
    opacity: 0.6;
    animation: floatUp linear infinite;
    z-index: 0;
}

@keyframes floatUp {
    from { transform: translateY(0); }
    to { transform: translateY(-110vh); }
}

/* GLASS BOX */
.box {
    position: relative;
    z-index: 2;
    width: 340px;
    height: 420px;
    padding: 25px;
    border-radius: 20px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.3);

    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    animation: pop 0.4s ease;
}

@keyframes pop {
    from {transform: scale(0.9); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

/* IMAGE FIX */
.img-container {
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
}

img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 12px;
    transition: opacity 0.4s ease;
}

/* TEXT */
p {
    margin: 10px 0;
    font-weight: 600; /* BOLDER TEXT */
    font-size: 15px;
    letter-spacing: 0.3px;
    transition: opacity 0.4s ease;
}

/* BUTTONS */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 12px;
    margin: 5px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: 0.2s;
}

/* GLOW EFFECT */
#yesBtn {
    background: #ff4d6d;
    color: white;
    box-shadow: 0 0 15px rgba(255,77,109,0.6);
}

#yesBtn:hover {
    box-shadow: 0 0 25px rgba(255,77,109,1);
}

/* NO BUTTON */
#noBtn {
    position: fixed;
    background: #ccc;
    z-index: 3;
}
</style></head><body><!-- BACKGROUND MUSIC --><audio id="bgMusic" autoplay loop>
    <source src="https://files.catbox.moe/6l9v9x.mp3" type="audio/mpeg">
</audio><script>
window.addEventListener("click", () => {
    document.getElementById("bgMusic").play();
});
</script><!-- FLOATING EMOJIS --><script>
const emojiList = ["💖","💕","💗","💘","💝","🌸","✨","🥺","❤️","💞"];

for(let i=0;i<40;i++){
    let e = document.createElement("div");
    e.className = "emoji";
    e.innerText = emojiList[Math.floor(Math.random()*emojiList.length)];
    e.style.left = Math.random()*100 + "vw";
    e.style.animationDuration = (4 + Math.random()*6) + "s";
    document.body.appendChild(e);
}
</script><div class="box">

<div>

</div>

const gif = document.getElementById("gif");
const text = document.getElementById("text");

gifs.forEach(src => {

});

noBtn.addEventListener("click", () => {

    text.style.opacity = 0;

        if(count < gifs.length){
            gif.src = gifs[count];
            text.innerText = texts[count];
            count++;
        }
        gif.style.opacity = 1;
        text.style.opacity = 1;
    }, 300);

});

function moveButton(){
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

moveButton();

};
</script></body>
</html>
